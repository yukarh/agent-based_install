AWSTemplateFormatVersion: "2010-09-09"
Description: >
  OpenShift 4.21 Agent-based Installer airgap AWS mock environment.
  No required parameters. Creates VPC, public/private subnets, generated EC2 key pairs,
  a RHEL 9 work EC2, a RHEL 9 dummy SNO EC2, a shared security group, and an Elastic IP.
  No NAT Gateway is created.

Metadata:
  Notes:
    Purpose: "On-prem/airgap simulation only. OpenShift platform is none; AWS resources are not managed by OpenShift."
    MdNormalizedEnvironmentValues:
      WorkPrivateIp: "10.0.0.10"
      SnoPrivateIp: "10.0.1.10"
      DnsNtpQuayIp: "10.0.0.10"
      PrivateGateway: "10.0.1.1"
      QuayFqdn: "quay.ocp.lab.test:8443"
      ClusterName: "ocp"
      BaseDomain: "lab.test"
      SnoHostname: "master-0.ocp.lab.test"
    Important:
      - "All parameters have defaults. You can create the stack without --parameters."
      - "AdminCidr defaults to 0.0.0.0/0 for convenience. Restrict it for real use."
      - "RHEL 9 AMI is resolved automatically from current Region by a Lambda-backed custom resource."
      - "EC2 key pairs are generated by CloudFormation and private keys are stored in SSM Parameter Store."
      - "SNO MAC address is assigned by AWS after instance creation. Retrieve it from the SnoMacLookupCommand output."
      - "SNO instance has no public IP and no NAT route."
      - "Agent ISO boot on AWS EC2 is not covered by this template."

Parameters:
  ProjectName:
    Type: String
    Default: ocp-airgap
    Description: Prefix for Name tags.
    AllowedPattern: "^[a-zA-Z0-9-]+$"

  AdminCidr:
    Type: String
    Default: 0.0.0.0/0
    Description: Source CIDR allowed to SSH/API/HTTP(S)/Quay from outside. Default is open for lab convenience; restrict to your public IP/32 when possible.
    AllowedPattern: "^([0-9]{1,3}\\.){3}[0-9]{1,3}/[0-9]{1,2}$"

  WorkInstanceType:
    Type: String
    Default: m6i.xlarge
    Description: Instance type for the work EC2.
    AllowedPattern: "^[a-z0-9.]+$"

  SnoInstanceType:
    Type: String
    Default: m6i.2xlarge
    Description: Instance type for the dummy SNO EC2.
    AllowedPattern: "^[a-z0-9.]+$"

  VpcCidr:
    Type: String
    Default: 10.0.0.0/16

  PublicSubnetCidr:
    Type: String
    Default: 10.0.0.0/24

  PrivateSubnetCidr:
    Type: String
    Default: 10.0.1.0/24

  WorkPrivateIp:
    Type: String
    Default: 10.0.0.10

  SnoPrivateIp:
    Type: String
    Default: 10.0.1.10

  WorkRootVolumeSize:
    Type: Number
    Default: 500
    MinValue: 100
    Description: Work EC2 root volume size in GiB.

  SnoRootVolumeSize:
    Type: Number
    Default: 120
    MinValue: 50
    Description: Dummy SNO EC2 root volume size in GiB.

Resources:
  LatestRhel9AmiLookupRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: latest-rhel9-ami-lookup
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ec2:DescribeImages
                Resource: "*"
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-latest-rhel9-ami-lookup-role"

  LatestRhel9AmiLookupFunction:
    Type: AWS::Lambda::Function
    Properties:
      Description: Resolve latest Red Hat Enterprise Linux 9 x86_64 PAYG AMI in this Region.
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LatestRhel9AmiLookupRole.Arn
      Timeout: 60
      Code:
        ZipFile: |
          import boto3, json, urllib.request, traceback

          def send(event, context, status, data, reason=None, physical_id=None):
              body = {
                  "Status": status,
                  "Reason": reason or ("See CloudWatch Log Stream: " + context.log_stream_name),
                  "PhysicalResourceId": physical_id or event.get("PhysicalResourceId") or context.log_stream_name,
                  "StackId": event["StackId"],
                  "RequestId": event["RequestId"],
                  "LogicalResourceId": event["LogicalResourceId"],
                  "NoEcho": False,
                  "Data": data,
              }
              encoded = json.dumps(body).encode("utf-8")
              req = urllib.request.Request(
                  event["ResponseURL"],
                  data=encoded,
                  method="PUT",
                  headers={"content-type": "", "content-length": str(len(encoded))},
              )
              with urllib.request.urlopen(req, timeout=10) as resp:
                  resp.read()

          def handler(event, context):
              try:
                  if event["RequestType"] == "Delete":
                      send(event, context, "SUCCESS", {}, physical_id=event.get("PhysicalResourceId"))
                      return

                  props = event.get("ResourceProperties", {})
                  owner = props.get("Owner", "309956199498")
                  name_pattern = props.get("NamePattern", "RHEL-9*")

                  ec2 = boto3.client("ec2")
                  paginator = ec2.get_paginator("describe_images")
                  images = []
                  for page in paginator.paginate(
                      Owners=[owner],
                      Filters=[
                          {"Name": "name", "Values": [name_pattern]},
                          {"Name": "architecture", "Values": ["x86_64"]},
                          {"Name": "root-device-type", "Values": ["ebs"]},
                          {"Name": "virtualization-type", "Values": ["hvm"]},
                          {"Name": "state", "Values": ["available"]},
                      ],
                  ):
                      images.extend(page.get("Images", []))

                  if not images:
                      raise Exception(f"No RHEL 9 AMI found for owner={owner}, name={name_pattern}")

                  images.sort(key=lambda image: image.get("CreationDate", ""), reverse=True)
                  image = images[0]
                  send(
                      event,
                      context,
                      "SUCCESS",
                      {
                          "ImageId": image["ImageId"],
                          "Name": image.get("Name", ""),
                          "CreationDate": image.get("CreationDate", ""),
                          "OwnerId": owner,
                      },
                      physical_id=f"latest-rhel9-{image['ImageId']}",
                  )
              except Exception as exc:
                  send(event, context, "FAILED", {}, reason=str(exc) + "\n" + traceback.format_exc())

      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-latest-rhel9-ami-lookup"

  LatestRhel9Ami:
    Type: Custom::LatestRhel9Ami
    Properties:
      ServiceToken: !GetAtt LatestRhel9AmiLookupFunction.Arn
      Owner: "309956199498"
      NamePattern: "RHEL-9*"

  WorkKeyPair:
    Type: AWS::EC2::KeyPair
    Properties:
      KeyName: !Sub "${AWS::StackName}-work-key"
      KeyFormat: pem
      KeyType: rsa
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-work-key"

  SnoKeyPair:
    Type: AWS::EC2::KeyPair
    Properties:
      KeyName: !Sub "${AWS::StackName}-sno-key"
      KeyFormat: pem
      KeyType: rsa
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-sno-key"

  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-vpc"

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-igw"

  VpcGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref Vpc
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Ref PublicSubnetCidr
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-public-a"

  PrivateSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Ref PrivateSubnetCidr
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-private-a"

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-public-rt"

  PublicDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: VpcGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-private-rt-no-nat"

  PrivateSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet
      RouteTableId: !Ref PrivateRouteTable

  LabSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for OCP airgap mock work and dummy SNO nodes.
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - Description: SSH from admin source to work EC2
          IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AdminCidr
        - Description: OCP/Quay/DNS/NTP lab internal traffic within VPC
          IpProtocol: "-1"
          CidrIp: !Ref VpcCidr
        - Description: Optional API access from admin source
          IpProtocol: tcp
          FromPort: 6443
          ToPort: 6443
          CidrIp: !Ref AdminCidr
        - Description: Optional HTTPS access from admin source
          IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: !Ref AdminCidr
        - Description: Optional HTTP access from admin source
          IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: !Ref AdminCidr
        - Description: Optional Quay access from admin source
          IpProtocol: tcp
          FromPort: 8443
          ToPort: 8443
          CidrIp: !Ref AdminCidr
      SecurityGroupEgress:
        - Description: Allow all egress. Private SNO still has no internet route because there is no NAT/default route.
          IpProtocol: "-1"
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-lab-sg"

  WorkInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !GetAtt LatestRhel9Ami.ImageId
      InstanceType: !Ref WorkInstanceType
      KeyName: !Ref WorkKeyPair
      MetadataOptions:
        HttpTokens: required
        HttpEndpoint: enabled
      NetworkInterfaces:
        - DeviceIndex: 0
          SubnetId: !Ref PublicSubnet
          GroupSet:
            - !Ref LabSecurityGroup
          PrivateIpAddress: !Ref WorkPrivateIp
          AssociatePublicIpAddress: true
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: !Ref WorkRootVolumeSize
            VolumeType: gp3
            DeleteOnTermination: true
            Encrypted: true
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail
          hostnamectl set-hostname work.ocp.lab.test || true
          if id ec2-user >/dev/null 2>&1; then
            mkdir -p /home/ec2-user/ocp-airgap/{config,iso-create,logs,mirror-registry,oc-mirror-work,pkg}
            chmod 700 /home/ec2-user/ocp-airgap/logs
            cat > /home/ec2-user/ocp-airgap/AWS_RESOURCE_VALUES.txt <<'EOF'
          work_private_ip=10.0.0.10
          sno_private_ip=10.0.1.10
          dns_ntp_quay_ip=10.0.0.10
          quay_fqdn=quay.ocp.lab.test:8443
          cluster=ocp
          base_domain=lab.test
          sno_hostname=master-0.ocp.lab.test
          rendezvous_ip=10.0.1.10
          private_subnet_gateway=10.0.1.1
          EOF
            chown -R ec2-user:ec2-user /home/ec2-user/ocp-airgap
          fi
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-work"

  WorkElasticIp:
    Type: AWS::EC2::EIP
    DependsOn: VpcGatewayAttachment
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-work-eip"

  WorkEipAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      InstanceId: !Ref WorkInstance
      AllocationId: !GetAtt WorkElasticIp.AllocationId

  SnoInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !GetAtt LatestRhel9Ami.ImageId
      InstanceType: !Ref SnoInstanceType
      KeyName: !Ref SnoKeyPair
      MetadataOptions:
        HttpTokens: required
        HttpEndpoint: enabled
      NetworkInterfaces:
        - DeviceIndex: 0
          SubnetId: !Ref PrivateSubnet
          GroupSet:
            - !Ref LabSecurityGroup
          PrivateIpAddress: !Ref SnoPrivateIp
          AssociatePublicIpAddress: false
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: !Ref SnoRootVolumeSize
            VolumeType: gp3
            DeleteOnTermination: true
            Encrypted: true
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail
          hostnamectl set-hostname master-0.ocp.lab.test || true
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-sno-master0-dummy"

Outputs:
  VpcId:
    Description: VPC ID.
    Value: !Ref Vpc

  SecurityGroupId:
    Description: Lab security group ID.
    Value: !Ref LabSecurityGroup

  PublicSubnetId:
    Description: Public subnet ID.
    Value: !Ref PublicSubnet

  PrivateSubnetId:
    Description: Private subnet ID.
    Value: !Ref PrivateSubnet

  ResolvedRhel9AmiId:
    Description: Latest RHEL 9 AMI ID resolved in this Region.
    Value: !GetAtt LatestRhel9Ami.ImageId

  ResolvedRhel9AmiName:
    Description: Latest RHEL 9 AMI name resolved in this Region.
    Value: !GetAtt LatestRhel9Ami.Name

  WorkKeyPairName:
    Description: Generated EC2 key pair name for the work EC2.
    Value: !Ref WorkKeyPair

  SnoKeyPairName:
    Description: Generated EC2 key pair name for the dummy SNO EC2.
    Value: !Ref SnoKeyPair

  WorkPrivateKeySsmParameter:
    Description: SSM Parameter Store name containing the generated private key for the work EC2.
    Value: !Sub "/ec2/keypair/${WorkKeyPair.KeyPairId}"

  SnoPrivateKeySsmParameter:
    Description: SSM Parameter Store name containing the generated private key for the dummy SNO EC2.
    Value: !Sub "/ec2/keypair/${SnoKeyPair.KeyPairId}"

  SaveWorkPrivateKeyCommand:
    Description: Run locally to save the generated work EC2 private key. Requires ssm:GetParameter permission.
    Value: !Sub "aws ssm get-parameter --name /ec2/keypair/${WorkKeyPair.KeyPairId} --with-decryption --query Parameter.Value --output text > ${WorkKeyPair}.pem && chmod 400 ${WorkKeyPair}.pem"

  SaveSnoPrivateKeyCommand:
    Description: Run locally to save the generated dummy SNO EC2 private key. Requires ssm:GetParameter permission.
    Value: !Sub "aws ssm get-parameter --name /ec2/keypair/${SnoKeyPair.KeyPairId} --with-decryption --query Parameter.Value --output text > ${SnoKeyPair}.pem && chmod 400 ${SnoKeyPair}.pem"

  WorkInstanceId:
    Description: Work EC2 instance ID.
    Value: !Ref WorkInstance

  WorkPublicIp:
    Description: Work EC2 public Elastic IP.
    Value: !Ref WorkElasticIp

  WorkPrivateIp:
    Description: Work EC2 private IP. Used for DNS, NTP, and Quay.
    Value: !Ref WorkPrivateIp

  SnoInstanceId:
    Description: Dummy SNO EC2 instance ID.
    Value: !Ref SnoInstance

  SnoPrivateIp:
    Description: Dummy SNO EC2 private IP and rendezvousIP.
    Value: !Ref SnoPrivateIp

  WorkSshCommand:
    Description: SSH command to the work EC2 after saving the generated private key.
    Value: !Sub "ssh -i ./${WorkKeyPair}.pem -o IdentitiesOnly=yes ec2-user@${WorkElasticIp}"

  SnoSshViaWorkCommand:
    Description: SSH command to the dummy SNO EC2 through the work EC2 after saving both generated private keys.
    Value: !Sub "ssh -i ./${SnoKeyPair}.pem -o IdentitiesOnly=yes -o 'ProxyCommand=ssh -i ./${WorkKeyPair}.pem -o IdentitiesOnly=yes -W %h:%p ec2-user@${WorkElasticIp}' ec2-user@${SnoPrivateIp}"

  SnoMacLookupCommand:
    Description: Run this after stack creation and use the result as SNO_MAC in agent-config.yaml.
    Value: !Sub "aws ec2 describe-instances --instance-ids ${SnoInstance} --query 'Reservations[0].Instances[0].NetworkInterfaces[0].MacAddress' --output text"

  LabValues:
    Description: Values expected by the OCP airgap procedure.
    Value: !Sub "work=10.0.0.10, dns=10.0.0.10, quay=quay.ocp.lab.test:8443, sno=10.0.1.10, rendezvousIP=10.0.1.10, gateway=10.0.1.1, cluster=ocp, baseDomain=lab.test"
